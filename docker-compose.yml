# Simplified local stack for the demo build — backend (FastAPI + in-process
# simulator) and frontend (Vite). No Kafka/Postgres/Redis required.
#
#   docker compose up --build
#   frontend -> http://localhost:5173   backend -> http://localhost:8000
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      REPLAY_SPEED_TPS: "10"
      CORS_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"

  frontend:
    image: node:20-slim
    working_dir: /app
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      # Talk to the backend container directly (browser hits localhost).
      VITE_API_URL: "http://localhost:8000"
      VITE_WS_URL: "ws://localhost:8000/ws/stream"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
